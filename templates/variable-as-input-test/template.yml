# GitLab CI Component: A test component for variables passed as input
#
# We want to test a possible bug in GitLab when variables defined at group level
# are not passed correctly to the components.
#
# Usage:
#   include:
#     - component: $CI_SERVER_FQDN/radiuss/radiuss-shared-ci/variable-as-input-test@v2026.03.0
#       inputs:
#         rsci_project_input: $RSCI_PROJECT_VAR
#         rsci_group_input: $RSCI_GROUP_VAR


spec:
  inputs:
    rsci_project_input:
      type: string
      description: "Input that should be set by variable set in project UI"
    rsci_group_input:
      type: string
      description: "Input that should be set by variable set in group UI"

---
# Draft PR filter job
ignore-draft-pr:
  stage: .pre
  tags: [shell, oslic]
  variables:
    GIT_STRATEGY: none
  script:
    - |
      # If the current branch is not in the always run pattern
      echo ""
      echo "### Component parameters ###"
      echo "# RSCI_PROJECT_VAR = ${RSCI_PROJECT_VAR}"
      echo "# RSCI_PROJECT_INPUT = $[[ inputs.rsci_project_input ]]"
      echo "# RSCI_GROUP_VAR = ${RSCI_GROUP_VAR}"
      echo "# RSCI_GROUP_INPUT = $[[ inputs.rsci_group_input ]]"
      echo ""
