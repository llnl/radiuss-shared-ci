# GitLab CI Component: Corona Pipeline
#
# This component provides CI pipeline templates for running jobs on the
# Corona supercomputer using the flux scheduler.
#
# Usage:
#   include:
#     - component: $CI_SERVER_FQDN/radiuss/radiuss-shared-ci/corona-pipeline@v2025.12.0
#       inputs:
#         job_cmd: "./scripts/build-and-test.sh"
#         job_alloc: "-N 1 -t 10m"
#         github_project_name: "my-project"
#         github_project_org: "LLNL"

spec:
  inputs:
    job_cmd:
      type: string
      description: "Command to execute for build and test"

    job_alloc:
      type: string
      description: "flux batch arguments for individual jobs"

    github_project_name:
      type: string
      description: "GitHub project name for status reporting"

    github_project_org:
      type: string
      description: "GitHub organization name"

    llnl_service_user:
      type: string
      description: "LLNL service user account for CI"
      default: ""

---
# Sets ID tokens for every job using `default:`
include:
  - project: 'lc-templates/id_tokens'
    file: 'id_tokens.yml'

variables:
  RSCI_JOB_CMD: "$[[ inputs.job_cmd | expand_vars ]]"
  RSCI_CORONA_JOB_ALLOC: "$[[ inputs.job_alloc ]]"
  RSCI_GITHUB_PROJECT_NAME: "$[[ inputs.github_project_name ]]"
  RSCI_GITHUB_PROJECT_ORG: "$[[ inputs.github_project_org ]]"
  RSCI_LLNL_SERVICE_USER: "$[[ inputs.llnl_service_user ]]"

stages:
  - is-machine-up
  - jobs-stage-1
  - jobs-stage-2
  - jobs-stage-3

##############################################################################
# UTILITIES

.on_corona:
  tags:
    - shell
    - corona
  rules:
    # Runs except if we explicitly deactivate corona by variable
    - if: '$ON_CORONA == "OFF"'
      when: never
    # Advanced jobs can only run on main, develop or if ALL_TARGETS is ON
    - if: '$ADVANCED_JOB == "ON" && $CI_COMMIT_BRANCH != "main" && $CI_COMMIT_BRANCH != "develop" && $ALL_TARGETS != "ON"'
      when: never
    # Default: run on success
    - when: on_success

# Custom job template - override this to create project-specific setup
.custom_job:
  variables:
    TEMPLATE_CANNOT_BE_EMPTY: "true"

.corona_reproducer_init:
  script:
    - |
      echo -e "\e[7;32m### CI job ${CI_JOB_ID} reproducer on corona (${SYS_TYPE}) \e[0m"
      if [[ -n "${RSCI_LLNL_SERVICE_USER}" ]]; then echo -e "xsu ${RSCI_LLNL_SERVICE_USER}"; fi
      echo -e "
      working_dir=\"/usr/workspace/\${USER}/${RSCI_GITHUB_PROJECT_NAME}/${CI_JOB_ID}-\$(date +%s)\" \n
      mkdir -p \${working_dir} && cd \${working_dir} \n
      git clone https://github.com/${RSCI_GITHUB_PROJECT_ORG}/${RSCI_GITHUB_PROJECT_NAME}.git --single-branch --depth=1 \n
      cd ${RSCI_GITHUB_PROJECT_NAME} \n
      git fetch origin --depth=1 ${CI_COMMIT_SHA} \n
      git checkout ${CI_COMMIT_SHA} \n
      git submodule update --init --recursive \n"

.corona_reproducer_vars:
  script:
    - |
      echo -e "# Define project specific variables here if any."
      #echo -e "export <CUSTOM_VAR>=\"\${<CUSTOM_VAR>}\""

.corona_reproducer_job:
  script:
    - |
      echo -e "flux watch \$(flux batch -o output.stdout.type=kvs ${RSCI_CORONA_JOB_ALLOC} ${RSCI_JOB_CMD} )"
      echo -e "\e[7;32m### End of reproducer\e[0m"

.corona_job_command:
  script:
    - flux watch $( echo -e ${RSCI_JOB_CMD} | xargs flux batch -o output.stdout.type=kvs ${RSCI_CORONA_JOB_ALLOC} )

.job_on_corona:
  extends: [.custom_job, .on_corona]
  stage: jobs-stage-1
  script:
    # Print a reproducer
    - !reference [.corona_reproducer_init, script]
    - !reference [.corona_reproducer_vars, script]
    - !reference [.corona_reproducer_job, script]
    # The actual launch command
    - !reference [.corona_job_command, script]
